# K9 Rehab Pro — Render Blueprint (Single Service)
# Backend serves frontend from public/ — one deployment, everything works.
# Deploy: Render Dashboard → New → Blueprint → Connect this repo

services:
  - type: web
    name: k9-rehab-pro
    runtime: node
    region: oregon
    buildCommand: cd backend && npm install && cd ../k9-rehab-frontend && npm install && npm run build && rm -rf ../backend/public/assets ../backend/public/index.html && cp -r build/* ../backend/public/
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    disk:
      name: k9-data
      mountPath: /var/data/k9-rehab-pro
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "https://k9-rehab-pro.onrender.com"
      - key: DB_PATH
        value: /var/data/k9-rehab-pro/database.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
