# K9 Rehab Pro — Render Blueprint
# Deploy: Render Dashboard → New → Blueprint → Connect this repo

services:
  # ─── Backend API (Express + SQLite) ───
  - type: web
    name: k9-rehab-pro-api
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
    # Uncomment for paid plan persistent disk ($7/mo):
    # disk:
    #   name: k9-data
    #   mountPath: /var/data
    #   sizeGB: 1

  # ─── Frontend Static Site (React CRA) ───
  - type: web
    name: k9-rehab-pro
    env: static
    rootDir: k9-rehab-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
