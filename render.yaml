# K9 Rehab Pro — Render Blueprint (Single Service)
# Backend serves frontend from public/ — one deployment, everything works.
# Deploy: Render Dashboard → New → Blueprint → Connect this repo

services:
  - type: web
    name: k9-rehab-pro
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && cd ../k9-rehab-frontend && NODE_ENV=development npm install && npm run build && cp -r build ../backend/public
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
