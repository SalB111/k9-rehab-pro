<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Glow filter for front elements -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Softer glow for background radial -->
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Staff gradient -->
    <linearGradient id="staffGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#0284c7"/>
      <stop offset="45%"  stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Snake gradient - front coils brighter -->
    <linearGradient id="snakeFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <!-- Background radial -->
    <radialGradient id="bgGrad" cx="50%" cy="52%" r="46%">
      <stop offset="0%"   stop-color="#0ea5e9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020c18" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── BACKGROUND ── deep navy rounded square with inner glow -->
  <rect width="200" height="200" rx="38" fill="#030c18"/>
  <rect width="200" height="200" rx="38" fill="url(#bgGrad)"/>
  <rect x="1.5" y="1.5" width="197" height="197" rx="36.5"
        fill="none" stroke="#0ea5e9" stroke-width="1.2" stroke-opacity="0.22"/>

  <!-- ══════════════════════════════════════════
       LAYER 1 — BEHIND-ROD coil (left bulge)
       Snake body that passes BEHIND the staff
       Dimmer so it reads as going behind
  ══════════════════════════════════════════ -->
  <!--  Runs from cross-point-1 (left of staff, y≈122)
        bulges far LEFT to ~(45, 98),
        arrives at cross-point-2 (right of staff, y≈76)  -->
  <path d="M 91 122 C 40 116, 36 80, 109 76"
        fill="none"
        stroke="#0369a1" stroke-width="6"
        stroke-opacity="0.65" stroke-linecap="round"/>

  <!-- ══════════════════════════════════════════
       LAYER 2 — STAFF
       Drawn on top of the behind coil
  ══════════════════════════════════════════ -->
  <!-- Staff body -->
  <rect x="95.5" y="24" width="9" height="152" rx="4.5"
        fill="url(#staffGrad)" filter="url(#glow)"/>

  <!-- Top orb -->
  <circle cx="100" cy="22" r="10"   fill="#0ea5e9"   filter="url(#glow)"/>
  <circle cx="100" cy="22" r="5.5"  fill="#030c18"/>
  <circle cx="100" cy="22" r="2.5"  fill="#38bdf8"   filter="url(#glow)"/>

  <!-- Bottom base plate -->
  <rect x="82" y="172" width="36" height="5.5" rx="2.75"
        fill="#0ea5e9" filter="url(#glow)"/>

  <!-- ══════════════════════════════════════════
       LAYER 3 — FRONT coils
       Drawn ON TOP of staff — visually in front
  ══════════════════════════════════════════ -->

  <!--  Segment A: TAIL → cross-point-1
        Tail starts bottom-right (116, 166)
        Bulges RIGHT out to ~(152, 143)
        Arrives at cross-point-1 (left of staff): (91, 122)
        This is the lower-right front coil -->
  <path d="M 116 166 C 156 158, 158 118, 91 122"
        fill="none"
        stroke="url(#snakeFront)" stroke-width="6.2"
        stroke-linecap="round" filter="url(#glow)"/>

  <!--  Segment B: cross-point-2 → HEAD approach
        From (109, 76) bulges RIGHT out to ~(150, 52)
        Curves left and upward to neck (~88, 32)
        Upper-right front coil  -->
  <path d="M 109 76 C 152 68, 152 34, 88 26"
        fill="none"
        stroke="url(#snakeFront)" stroke-width="6.2"
        stroke-linecap="round" filter="url(#glow)"/>

  <!-- ══════════════════════════════════════════
       SNAKE HEAD — on top of everything
  ══════════════════════════════════════════ -->
  <!-- Head body — elongated oval, rotated to face upper-left -->
  <ellipse cx="84" cy="21" rx="15" ry="10"
           fill="#051828" stroke="#0ea5e9" stroke-width="2.2"
           transform="rotate(-28 84 21)"
           filter="url(#glow)"/>

  <!-- Scale texture hint -->
  <ellipse cx="84" cy="21" rx="15" ry="10"
           fill="none" stroke="#38bdf8" stroke-width="0.7" stroke-opacity="0.4"
           transform="rotate(-28 84 21)"/>

  <!-- Jaw line -->
  <path d="M 74 26 C 76 30, 82 32, 88 29"
        fill="none" stroke="#0ea5e9" stroke-width="1.4" stroke-linecap="round"
        stroke-opacity="0.7"/>

  <!-- Eye — bright teal with pupil slit -->
  <circle cx="77" cy="17" r="3.8" fill="#38bdf8" filter="url(#softGlow)"/>
  <circle cx="77" cy="17" r="1.8" fill="#010810"/>
  <!-- Highlight sparkle -->
  <circle cx="76" cy="16" r="0.8" fill="#e0f2fe"/>

  <!-- Forked tongue — two fine tines -->
  <path d="M 69 24 C 63 21, 59 19, 55 17"
        fill="none" stroke="#0ea5e9" stroke-width="1.6" stroke-linecap="round"
        filter="url(#glow)"/>
  <path d="M 69 24 C 63 25, 59 27, 55 30"
        fill="none" stroke="#0ea5e9" stroke-width="1.6" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- ── Coil highlight edges — thin brighter inner edge for 3-D depth ── -->
  <!-- Lower coil front highlight -->
  <path d="M 116 166 C 150 160, 152 125, 96 124"
        fill="none" stroke="#7dd3fc" stroke-width="1.4"
        stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Upper coil front highlight -->
  <path d="M 109 76 C 148 70, 150 37, 92 28"
        fill="none" stroke="#7dd3fc" stroke-width="1.4"
        stroke-opacity="0.45" stroke-linecap="round"/>
</svg>
